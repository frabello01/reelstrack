<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ReelsTrack App</title>

    <!-- ============================================================
         Crawler directives — hardcoded so they're visible to crawlers
         that don't execute JavaScript (Meta's facebookexternalhit, the
         OG preview generator, googlebot, etc). Without these in the
         static HTML, the React injection in PublicLandingPage would
         only reach JS-capable bots — which is the minority.

         Applied globally across the SPA: landings on custom domains,
         admin app on app.reelstrack.io, redirect deeplinks — none of
         these should ever be indexed by search engines, and none
         should leak the originating URL to the click destination.
         ============================================================ -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, nocache" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="referrer" content="no-referrer" />

    <!-- Favicon (browser tab) -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- iOS "Add to Home Screen" icon. iOS auto-rounds the corners and
         resizes from this 512x512 source down to the device's exact size. -->
    <link rel="apple-touch-icon" href="/app-icon.png" />

    <!-- iOS home-screen hints. Note: NO apple-mobile-web-app-capable —
         that meta makes iOS open the icon in standalone mode (separate
         app, no Safari chrome). We deliberately want it to open in the
         real Safari with all its tabs/history/cookies. -->
    <meta name="apple-mobile-web-app-title" content="ReelsTrack" />

    <!-- Android Chrome web app manifest. display:"browser" inside the
         manifest tells Chrome to open the icon as a regular tab, not
         a standalone app window. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0f" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
